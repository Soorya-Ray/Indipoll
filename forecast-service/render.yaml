services:
  - type: web
    name: indipoll-forecast
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: PORT
        value: 8000
      - key: MODEL_DIR
        value: /tmp/models
